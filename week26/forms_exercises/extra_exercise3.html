<!doctype html>
<html>
  <main>
    <form action="./additional/summary.html" method="post">
      <h1></h1>
      <label for="fullname">Full name</label>
      <br />
      <input type="text" name="fullname" id="fullname" />
      <br />

      <label for="number">Age</label>
      <br />
      <input type="number" name="number" id="number" />
      <br />

      <h2>How often do you read books?</h2>
      <label for="diary">Diary</label>
      <input type="radio" name="diary" id="diary" />
      <br />

      <label for="weekly">Weekly</label>
      <input type="radio" name="weekly" id="weekly" />
      <br />

      <label for="hardly_ever">Hardly Ever</label>
      <input type="radio" name="hardly_ever" id="hardly_ever" />
      <br />

      <label for="recomendation">Recomend your favorite book!</label>
      <br />
      <textarea name="recomendation" id="recomendation"></textarea>
      <br />

      <input type="submit" value="Send" />
    </form>
  </main>
</html>
