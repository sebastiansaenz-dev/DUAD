<!doctype html>
<html>
  <main>
    <form action="./additional/confirmation.html" method="post">
      <h1>Hotel Reservation</h1>
      <label for="fullname">Full name</label>
      <br />
      <input type="text" name="fullname" id="fullname" />
      <br />

      <label for="email">Email</label>
      <br />
      <input type="email" name="email" id="email" />
      <br />

      <label for="entry_date">Entry date</label>
      <br />
      <input type="date" name="entry_date" id="entry_date" />
      <br />

      <label for="departure_date">Departure date</label>
      <br />
      <input type="date" name="departure_date" id="departure_date" />
      <br />

      <h2>Type of room</h2>
      <label for="standar">Standar</label>
      <input type="radio" name="standar" id="standar" />
      <br />

      <label for="premium">Premium</label>
      <input type="radio" name="premium" id="premium" />
      <br />

      <label for="suite">Suite</label>
      <input type="radio" name="suite" id="suite" />
      <br />

      <h2>Extra Services</h2>
      <label for="breakfast">Breakfast</label>
      <input type="checkbox" name="breakfast" id="breakfast" />
      <br />

      <label for="wifi">Wifi</label>
      <input type="checkbox" name="wifi" id="wifi" />
      <br />

      <label for="parking">Parking</label>
      <input type="checkbox" name="parking" id="parking" />
      <br />

      <label for=""></label>
      <input type="submit" value="Reserve" />
    </form>
  </main>
</html>
