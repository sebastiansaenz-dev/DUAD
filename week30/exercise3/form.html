<!doctype html>
<html>
  <body>
    <form action="" method="POST">
      <h1>Your info</h1>

      <input type="email" id="email" name="email" placeholder="email" />

      <input
        type="password"
        id="password"
        name="password"
        placeholder="password"
      />

      <input type="text" id="name" name="name" placeholder="name" />

      <input
        type="text"
        id="last-name"
        name="lastName"
        placeholder="last name"
      />

      <h2>Are you an employee</h2>
      <label for="radio-employee-yes">Yes</label>
      <input type="radio" id="radio-employee-yes" , name="radio-employee" />

      <label for="radio-employee-no">No</label>
      <input type="radio" id="radio-employee-no" , name="radio-employee" />

      <div id="employment-section"></div>

      <input type="submit" value="Send" />
    </form>
    <script src="./script.js"></script>
  </body>
</html>
